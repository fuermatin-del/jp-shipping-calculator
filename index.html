<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Amazon Japan 客服邮件模板助手</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <aside class="sidebar" aria-label="模板筛选">
      <div class="brand">
        <span class="brand-mark">JP</span>
        <div>
          <h1>邮件模板助手</h1>
          <p>Amazon Japan customer support</p>
        </div>
      </div>

      <label class="field">
        <span>搜索</span>
        <input id="searchInput" type="search" placeholder="例：破损、未着、返品、返金">
      </label>

      <div class="field">
        <span>场景</span>
        <div id="categoryFilters" class="chip-grid" role="list"></div>
      </div>

      <label class="field">
        <span>语气</span>
        <select id="toneSelect">
          <option value="all">全部</option>
          <option value="standard">标准</option>
          <option value="apology">郑重道歉</option>
          <option value="firm">规则说明</option>
          <option value="warm">温和安抚</option>
        </select>
      </label>

      <section class="variables" aria-label="变量填写">
        <h2>信息填写</h2>
        <label class="field compact">
          <span>买家称呼</span>
          <input data-var="buyerName" type="text" placeholder="例：山田（様自动补）">
        </label>
        <label class="field compact">
          <span>配件/部品名</span>
          <input data-var="partName" type="text" placeholder="例：ミラーパネル">
        </label>
        <label class="field compact">
          <span>返金金额</span>
          <input data-var="refundAmount" type="text" placeholder="例：1,000円">
        </label>
        <label class="field compact">
          <span>配送公司</span>
          <input data-var="carrier" type="text" placeholder="例：佐川急便">
        </label>
        <label class="field compact">
          <span>追踪号</span>
          <input data-var="trackingNumber" type="text" placeholder="例：問い合わせ番号">
        </label>
      </section>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div>
          <p id="resultCount" class="count">0 件</p>
          <h2 id="currentCategory">全部模板</h2>
        </div>
        <div class="toolbar">
          <label class="file-button" title="导入模板文件">
            <span aria-hidden="true">↥</span>
            导入
            <input id="importInput" type="file" accept=".json,application/json">
          </label>
          <button id="exportButton" class="ghost-button" type="button">
            <span aria-hidden="true">↧</span>
            导出
          </button>
          <button id="resetImportButton" class="ghost-button" type="button">重置导入</button>
          <button id="clearButton" class="icon-button" type="button" title="清空输入" aria-label="清空输入">
            <span aria-hidden="true">⌫</span>
          </button>
          <button id="copyButton" class="primary-button" type="button">
            <span aria-hidden="true">⧉</span>
            复制回复
          </button>
        </div>
      </header>

      <div class="content-grid">
        <section class="template-list" aria-label="模板列表">
          <div id="templateList" class="template-list-inner"></div>
        </section>

        <section class="reply-panel" aria-label="回复预览">
          <section class="smart-panel" aria-label="智能匹配">
            <div class="section-heading">
              <div>
                <p class="meta">买家消息</p>
                <h3>粘贴后自动匹配回复</h3>
              </div>
              <button id="analyzeButton" class="primary-button" type="button">
                <span aria-hidden="true">◎</span>
                识别匹配
              </button>
            </div>

            <label class="field">
              <span>买家原文 / Amazon官方消息</span>
              <textarea id="buyerMessage" rows="5" placeholder="把买家消息直接粘贴在这里，例如：鏡が割れていました。返品したいです。"></textarea>
            </label>

            <div id="matchPanel" class="match-panel">
              <p>粘贴买家消息后，会根据内置历史话术自动匹配最接近的模板。</p>
            </div>
          </section>

          <div class="reply-header">
            <div>
              <p id="templateMeta" class="meta">请选择模板</p>
              <h3 id="templateTitle">日文回复</h3>
            </div>
            <button id="variantButton" class="ghost-button" type="button">换一种说法</button>
          </div>

          <label class="field">
            <span>真人感补充句</span>
            <select id="humanLineSelect"></select>
          </label>

          <label class="field">
            <span>中文补充/调整</span>
            <textarea id="chineseDraft" rows="3" placeholder="例：告诉买家我们可以安排全额退款，破损商品不需要退回。"></textarea>
          </label>

          <label class="field">
            <span>日文补充/译文</span>
            <textarea id="customLine" rows="3" placeholder="AI接口接入后，这里会根据中文补充自动生成日文；现在也可以直接输入日文补充。"></textarea>
          </label>

          <textarea id="replyOutput" class="reply-output" spellcheck="false" aria-label="日文回复输出"></textarea>

          <div class="notes">
            <h4>确认点</h4>
            <ul id="checklist"></ul>
          </div>
        </section>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="templates.js"></script>
  <script src="app.js"></script>
</body>
</html>
